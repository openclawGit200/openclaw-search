name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via Cloudflare Pages API
        run: |
          # Get Cloudflare credentials from environment
          CF_EMAIL="${{ vars.CLOUDFARE_EMAIL }}"
          CF_KEY="${{ secrets.CLOUDFARE_API_KEY }}"
          ACCOUNT_ID="${{ vars.CLOUDFARE_ACCOUNT_ID }}"
          
          # First create a deployment to get upload URL
          RESPONSE=$(curl -s -X POST \
            -H "X-Auth-Email: $CF_EMAIL" \
            -H "X-Auth-Key: $CF_KEY" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/openclaw-search/deployments" \
            -d '{"branch":"main"}')
          
          echo "Response: $RESPONSE"
